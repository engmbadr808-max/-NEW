<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>شاشة المسجد</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- العنوان -->
<div class="title">
    مسجد الأمير فواز
</div>

<!-- الذكر -->
<div class="zekr">
    أستغفر الله العظيم
</div>

<!-- الساعة -->
<div class="clockBox">
    <div id="clock"></div>
    <div id="date"></div>
    <div id="hijriDate"></div>
</div>

<!-- الصلوات -->
<div class="prayers">

    <div class="prayer" id="fajrBox">
        <div>الفجر</div>
        <span id="fajr"></span>
    </div>

    <div class="prayer" id="sunriseBox">
        <div>الشروق</div>
        <span id="sunrise"></span>
    </div>

    <div class="prayer" id="dhuhrBox">
        <div>الظهر</div>
        <span id="dhuhr"></span>
    </div>

    <div class="prayer" id="asrBox">
        <div>العصر</div>
        <span id="asr"></span>
    </div>

    <div class="prayer" id="maghribBox">
        <div>المغرب</div>
        <span id="maghrib"></span>
    </div>

    <div class="prayer" id="ishaBox">
        <div>العشاء</div>
        <span id="isha"></span>
    </div>

</div>

<!-- الإقامة -->
<div class="iqama">
    الإقامة بعد: <span id="iqamaTimer">10:00</span>
</div>

<script src="script.js"></script>

</body>
</html>
