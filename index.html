<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شاشة المسجد</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="bg"></div>

<!-- اسم المسجد -->
<div class="mosque-name">
مسجد الأمير فواز
</div>

<!-- الذكر -->
<div class="zekr-box">
أستغفر الله العظيم
</div>

<!-- الساعة -->
<div class="time-panel">
    <div class="digital-time" id="clock"></div>
    <div class="date-box" id="date"></div>
    <div class="date-box" id="hijriDate"></div>
</div>

<!-- الصلوات -->
<div class="prayer-bar">

<div class="prayer" id="fajrBox">
الفجر<br><span id="fajr"></span>
</div>

<div class="prayer" id="sunriseBox">
الشروق<br><span id="sunrise"></span>
</div>

<div class="prayer active" id="dhuhrBox">
الظهر<br><span id="dhuhr"></span>
</div>

<div class="prayer" id="asrBox">
العصر<br><span id="asr"></span>
</div>

<div class="prayer" id="maghribBox">
المغرب<br><span id="maghrib"></span>
</div>

<div class="prayer" id="ishaBox">
العشاء<br><span id="isha"></span>
</div>

</div>

<!-- الإقامة -->
<div class="iqama">
الإقامة بعد: <span id="iqamaTimer">10:00</span>
</div>

<script src="script.js"></script>
</body>
</html>
